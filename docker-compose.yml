version: "3.8"

x-airflow-common: &airflow-common
  # image: apache/airflow:2.8.1-python3.10
  build:
    context: .
    dockerfile: Dockerfile

  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO

  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./config:/opt/airflow/config
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs

  user: "${AIRFLOW_UID:-50000}:0"

  depends_on:
    postgres_airflow:
      condition: service_healthy

services:

  ####################################################
  # Airflow Metadata Database
  ####################################################

  postgres_airflow:
    image: postgres:13

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    volumes:
      - airflow_db:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: always

  ####################################################
  # Airflow Initialization
  ####################################################

  airflow-init:
    <<: *airflow-common

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      "

  ####################################################
  # Airflow Webserver
  ####################################################

  airflow-webserver:
    <<: *airflow-common

    command: webserver

    ports:
      - "8080:8080"

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    restart: always

  ####################################################
  # Airflow Scheduler
  ####################################################

  airflow-scheduler:
    <<: *airflow-common

    command: scheduler

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    restart: always

  ####################################################
  # Source OLTP Database
  ####################################################

  source_oltp_db:
    image: postgres:15

    container_name: source_oltp_db

    environment:
      POSTGRES_USER: source_user
      POSTGRES_PASSWORD: source_pass
      POSTGRES_DB: ecommerce_source

    ports:
      - "5433:5432"

    volumes:
      - source_db:/var/lib/postgresql/data

    restart: always

  ####################################################
  # Target Data Warehouse
  ####################################################

  target_olap_db:
    image: postgres:15

    container_name: target_olap_db

    environment:
      POSTGRES_USER: dw_user
      POSTGRES_PASSWORD: dw_pass
      POSTGRES_DB: ecommerce_dw

    ports:
      - "5434:5432"

    volumes:
      - target_db:/var/lib/postgresql/data

    restart: always


